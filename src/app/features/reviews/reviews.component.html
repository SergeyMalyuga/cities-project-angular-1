<section class="offer__reviews reviews">
  <h2 class="reviews__title">
    Reviews &middot; <span class="reviews__amount">{{ commentsCount }}</span>
  </h2>
  <app-reviews-list [comments]="comments" />
  @if (authStatus() === AuthorizationStatus.AUTH) {
    <app-reviews-form (submitted)="onSubmitted($event)" />
  }
</section>
