<form class="places__sorting" action="#" method="get">
  <span class="places__sorting-caption">Sort by</span>
  <span appToggle (toggled)="toggleOptions()" [isOpen]="isOpen()" class="places__sorting-type" tabindex="0">
              Popular
              <svg class="places__sorting-arrow" width="7" height="4">
                <use xlink:href="#icon-arrow-select"></use>
              </svg>
            </span>
  <ul
    appClickOutside [isOpen]="isOpen()"
    (outsideClicked)="closeOptions()"
    class="places__options places__options--custom" [class.places__options--opened]="isOpen()"
  >
    <li appSelectSortType [sortType]="SortType.POPULAR" class="places__option places__option--active" tabindex="0">
      Popular
    </li>
    <li appSelectSortType [sortType]="SortType.PRICE_LOW_TO_HIGH" class="places__option" tabindex="0">Price: low to
      high
    </li>
    <li appSelectSortType [sortType]="SortType.PRICE_HIGH_TO_LOW" class="places__option" tabindex="0">Price: high to
      low
    </li>
    <li appSelectSortType [sortType]="SortType.TOP_RATED_FIRST" class="places__option" tabindex="0">Top rated first</li>
  </ul>
</form>
