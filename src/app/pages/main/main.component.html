<div class="page page--gray page--main">
  <app-header />
  <main class="page__main page__main--index">
    <h1 class="visually-hidden">Cities</h1>
    <div class="tabs">
      <section class="locations container">
        <app-locations-list
          (citySelected)="changeCity($event)"
          [currentCity]="currentCity()"
        />
      </section>
    </div>
    <div class="cities">
      <div class="cities__places-container container">
        <section class="cities__places places">
          <h2 class="visually-hidden">Places</h2>
          <b class="places__found"
            >{{ offersAmount() }} places to stay in Amsterdam</b
          >
          <app-form-places-sorting
            [currentSortType]="sortType()"
            (sortTypeSelected)="changeSortType($event)"
          />
          <div class="cities__places-list places__list tabs__content">
            @for (offer of offers() | sortBy: sortType(); track offer.id) {
              <app-offer-card [offer]="offer" (hovered)="changeActiveCard($event)" />
            }
          </div>
        </section>
        <div class="cities__right-section">
          <section class="cities__map map">
            <app-map [offers]="offers()" [currentCity]="currentCity()" [activeCard]="activeCard()"></app-map>
          </section>
        </div>
      </div>
    </div>
  </main>
</div>
